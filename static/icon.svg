<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <!-- Subtle inner glow -->
  <rect width="64" height="64" rx="12" fill="url(#glow)"/>

  <!-- ── Bridge ── -->
  <!-- Main deck/road -->
  <rect x="5" y="45" width="54" height="3.5" rx="1.5" fill="white" opacity="0.95"/>
  <!-- Left tower -->
  <rect x="13" y="29" width="4.5" height="19" rx="1" fill="white" opacity="0.92"/>
  <!-- Right tower -->
  <rect x="46.5" y="29" width="4.5" height="19" rx="1" fill="white" opacity="0.92"/>
  <!-- Tower crossbars -->
  <rect x="12" y="34" width="7" height="2" rx="0.8" fill="white" opacity="0.65"/>
  <rect x="45.5" y="34" width="7" height="2" rx="0.8" fill="white" opacity="0.65"/>

  <!-- Main suspension cables (catenary arcs) -->
  <path d="M 15.25 29 Q 32 9 48.75 29" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>

  <!-- Vertical hangers -->
  <line x1="22" y1="22.5" x2="22" y2="45" stroke="white" stroke-width="1.1" opacity="0.55"/>
  <line x1="29" y1="18.2" x2="29" y2="45" stroke="white" stroke-width="1.1" opacity="0.55"/>
  <line x1="35" y1="18.2" x2="35" y2="45" stroke="white" stroke-width="1.1" opacity="0.55"/>
  <line x1="42" y1="22.5" x2="42" y2="45" stroke="white" stroke-width="1.1" opacity="0.55"/>

  <!-- ── Kiwi bird (on left tower top) ── -->
  <!-- Body: fat teardrop, tail at left -->
  <ellipse cx="15.5" cy="24.5" rx="5.5" ry="4.2" fill="white"/>
  <!-- Head: circle blending into body -->
  <circle cx="20" cy="22" r="4" fill="white"/>
  <!-- Long drooping beak -->
  <path d="M 23.2 22.5 Q 29 24.5 30.5 27 Q 28 26.5 22.5 24.5 Z" fill="white"/>
  <!-- Eye -->
  <circle cx="21.5" cy="21" r="1" fill="#1e1b4b" opacity="0.9"/>
  <circle cx="21.8" cy="20.7" r="0.3" fill="white" opacity="0.9"/>
  <!-- Tiny tail flick -->
  <path d="M 10.5 24 Q 8 22.5 9 20.5 Q 10.5 22.5 11 24.5" fill="white" opacity="0.7"/>
</svg>
